name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MEMORYOS_PYTHON_PATHS: >-
        config.py pre memory behavior openApi policy agent_hook infrastructure
        foundation runtime sanitization transaction
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[mcp,server]'
          python -m pip install ruff mypy pyright
      - name: Compile
        run: python -m compileall -q $MEMORYOS_PYTHON_PATHS
      - name: Lint
        run: ruff check $MEMORYOS_PYTHON_PATHS
      - name: Type check
        run: |
          mypy $MEMORYOS_PYTHON_PATHS
          pyright $MEMORYOS_PYTHON_PATHS
      - name: OpenClaw integration
        working-directory: integrations/openclaw
        run: |
          npm ci
          npm run build
      - name: OpenCode integration
        working-directory: integrations/opencode
        run: |
          npm ci
          npm run build
