name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff mypy pyright
      - name: Compile
        run: python -m compileall -q memoryos tests
      - name: Lint
        run: ruff check memoryos tests
      - name: Type check
        run: mypy memoryos
      - name: Tests
        run: python -m unittest discover -s tests
