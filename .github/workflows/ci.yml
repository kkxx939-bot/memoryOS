name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      M2BOS_PYTHON_PATHS: LLMClient pre memory infrastructure foundation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[llm]'
          python -m pip install ruff mypy pyright
      - name: Compile
        run: python -m compileall -q $M2BOS_PYTHON_PATHS
      - name: Lint
        run: ruff check $M2BOS_PYTHON_PATHS
      - name: Type check
        run: |
          mypy $M2BOS_PYTHON_PATHS
          pyright $M2BOS_PYTHON_PATHS
