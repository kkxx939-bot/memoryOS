[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = false
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
include = ["memoryos", "tests"]
reportUnsupportedDunderAll = false
