[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "memoryos"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["PyYAML>=6.0.2,<7"]

[project.optional-dependencies]
mcp = ["mcp>=1.0,<2"]
server = ["uvicorn>=0.30,<1"]
test = ["pytest>=8.2,<9"]

[project.scripts]
memoryos = "memoryos.api.cli.main:main"
memoryos-mcp-server = "memoryos.api.mcp.stdio:main"
memoryos-agent-hook = "memoryos.adapters.agent_hooks.cli:main"
memoryos-http-server = "memoryos.api.http.app:main"

[tool.setuptools.packages.find]
include = ["memoryos*"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = false
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
include = ["memoryos", "tests"]
reportUnsupportedDunderAll = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["*Test", "Test*"]
python_functions = ["test_*"]
